spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: patient-service
              uri: ${PATIENT_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/patients/**
            - id: notes-service
              uri: ${NOTES_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/notes/**
            - id: assessment-service
              uri: ${ASSESSMENT_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/assessment/**

server:
  port: 8080

# JWT RS256 émis par la gateway (JwtIssuer) et injecté en Authorization: Bearer
# vers les backs, en remplacement de l'ancien AddRequestHeader X-Gateway-Secret.
jwt:
  issuer: medilabo-gateway
  expiration-seconds: 60
  private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private_key.pem}

management:
  endpoints:
    web:
      exposure:
        include: health