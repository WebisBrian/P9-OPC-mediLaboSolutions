<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Patients — MédiLabo Solutions')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container">
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Liste des patients</h2>
        <a th:href="@{/patients/new}" class="btn btn-success">Ajouter un patient</a>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Prénom</th>
            <th>Nom</th>
            <th>Date de naissance</th>
            <th>Genre</th>
            <th>Adresse</th>
            <th>Téléphone</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="patient : ${patients}">
            <td th:text="${patient.firstName()}"></td>
            <td th:text="${patient.lastName()}"></td>
            <td th:text="${patient.birthDate()}"></td>
            <td th:text="${patient.gender()}"></td>
            <td th:text="${patient.address()}"></td>
            <td th:text="${patient.phone()}"></td>
            <td>
                <a th:href="@{/patients/{id}(id=${patient.id()})}" class="btn btn-sm btn-info me-1">Détail</a>
                <a th:href="@{/patients/{id}/edit(id=${patient.id()})}" class="btn btn-sm btn-warning me-1">Modifier</a>
                <form th:action="@{/patients/{id}/delete(id=${patient.id()})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger">Supprimer</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(patients)}">
            <td colspan="7" class="text-center text-muted">Aucun patient enregistré.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
