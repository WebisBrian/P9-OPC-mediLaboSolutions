spring.application.name=notes-service
server.port=8083

spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:medilabo_notes}

jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:classpath:keys/public_key.pem}
jwt.issuer=medilabo-gateway

management.endpoints.web.exposure.include=health